<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
    <main>
        <div class="breadcrumbs">
            <a href="/">Home</a> <span>/</span> <a href="/login">Log in</a>
        </div>

        <section class="login-container">
            <h1>Log in or sign up</h1>
            <p>Please enter your email address:</p>

            <form action="#">
                <label for="email">Email*</label>
                <input type="email" id="email" placeholder="yourname@example.com">
                <div class="remember-me">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me">Remember me</label>
                </div>
                <button type="submit">Continue</button>
            </form>

            

            <!-- Add link to redirect to registration form -->
            <div class="email-link">
                <p>Don't have an account? <a href="/Login/register.html">Register here</a>.</p>
            </div>

            <div class="benefits">
                <div class="benefit">
                    <span>❤️</span>
                    <p>Join Club Clarins & receive 50 points</p>
                </div>
                <div class="benefit">
                    <span>🎁</span>
                    <p>Earn points & rewards today</p>
                </div>
                <div class="benefit">
                    <span>🚚</span>
                    <p>Fast checkout & order tracking</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Javascript to enhance functionality (optional)
    </script>
</body>

</html>
